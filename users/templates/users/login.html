<html>
    <head>
        <title>StockSphere Login</title>
    </head>
    <body>
        <h1> User Login </h1>
        {% if messages %}
            {% for message in messages %}
                <p>{{ message }}</p>
            {% endfor %}
        {% endif %}
        <form method="post">
            {% csrf_token %}
            {{form.as_p}}
            <button type="submit">Login</button>
        </form>
    </body>
</html>
