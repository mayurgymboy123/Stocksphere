<!DOCTYPE html>
<html>
<head>
    <title>Edit Profile</title>
</head>
<body>

    <h1>Edit Profile</h1>

    {% if messages %}
        {% for message in messages %}
            <p>{{ message }}</p>
        {% endfor %}
    {% endif %}

    <form method="post">

        {% csrf_token %}

        {{ form.as_p }}

        <button type="submit">
            Save Changes
        </button>

    </form>

    <br>

    <a href="{% url 'users:profile' %}">
        Back to Profile
    </a>

</body>
</html>
