{% extends "dashboard_base.html" %}

{% block title %}
Create Company
{% endblock %}

{% block content %}

<h2>Create Company</h2>

<form
    method="post"
    enctype="multipart/form-data">
    {% csrf_token %}
    {{ form.as_p }}
    <button
        class="btn btn-success"
        type="submit">
        Create Company
    </button>
</form>
{% endblock %}
